scope: otus_cluster
namespace: /db/
name: {HOSTNAME}
restapi:
  listen: {IP_ADDR}:8008
  connect_address: {IP_ADDR}:8008
etcd:
  hosts: {HOSTNAME_ETCD1}:2379,{HOSTNAME_ETCD2}:2379,{HOSTNAME_ETCD3}:2379
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
  postgresql:
    use_pg_rewind: true
    parameters:
      max_connections: 200
      autovacuum_analyze_scale_factor: 0.01
#  initdb: ["encoding=UTF8", "data-checksums", "username=postgres", "auth=scram-sha-256"]
  pg_hba:
    - host replication replicator 0.0.0.0/0      scram-sha-256
    - host all         all        0.0.0.0/0      scram-sha-256
    # - host replication replicator 127.0.0.1/8    scram-sha-256
    # - host replication replicator 192.168.0.0/24 scram-sha-256
  users:
    admin:
      password: adminpassword
      options:
        - createrole
        - createdb
postgresql:
  listen: 0.0.0.0,127.0.0.1:5432
  connect_address: {IP_ADDR}:5432
  data_dir: /var/lib/postgresql/18/main
  bin_dir: /usr/lib/postgresql/18/bin
  config_dir: /etc/postgresql/18/main/
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: replicator
    superuser:
      username: postgres
      password: postgres
    rewind:
      username: rewind_user
      password: rewind_user
  parameters:
    unix_socket_directories: "/var/run/postgresql"
tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false