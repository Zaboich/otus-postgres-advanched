#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    # Логирование через syslog локального демона
    log /dev/log local0
    log /dev/log local1 notice

    # Максимальное количество одновременных подключений к самому HAProxy
    maxconn 4096

    # Пользователь и группа, от имени которых работает процесс (безопасность)
    user haproxy
    group haproxy

    # Режим демона
    daemon

    # Путь к файлу PID
    pidfile /var/run/haproxy.pid

#---------------------------------------------------------------------
# Default settings
#---------------------------------------------------------------------
defaults
    log     global
    mode    tcp                   # PostgreSQL использует TCP, не HTTP
    option  tcplog                # Логировать в формате TCP

    # Таймауты (критично для БД)
    timeout connect 5s            # Время на установку соединения с нодой
    timeout client  1h            # Время жизни соединения клиента (долгое для долгих запросов)
    timeout server  1h            # Время ожидания ответа от сервера БД

    # Опции для повышения стабильности
    option  dontlognull           # Не логировать пустые соединения (сканирование портов)
    option  contstats             # Периодическая статистика в лог
    retries 3                     # Количество попыток переподключения при ошибке

    # Обработка разрывов
    option  redispatch            # Если сервер упал во время сессии, пробовать другой
    timeout http-request 10s      # Таймаут на HTTP запрос (используется для health checks)

#---------------------------------------------------------------------
# Статистика HAProxy (Monitoring)
#---------------------------------------------------------------------
# Доступна по http://<haproxy-ip>:8008/haproxy?stats
# Рекомендуется закрыть доступ из внешней сети (bind 127.0.0.1) или настроить ACL
listen stats
    bind *:8008
    mode http
    stats enable
    stats uri /haproxy?stats
    stats refresh 10s
#    stats admin if TRUE           # Позволяет управлять серверами через интерфейс (осторожно!)
#    stats auth admin:strong_password # Логин:пароль для доступа к статистике

#---------------------------------------------------------------------
# FRONTEND: Запись (WRITE) -> Только MASTER
#---------------------------------------------------------------------
# Клиенты подключаются на порт 5432 для операций INSERT/UPDATE/DELETE
frontend postgres_write
    bind *:5432
    mode tcp
    # Все запросы направляются в бэкенд master
    default_backend postgres_master

#---------------------------------------------------------------------
# BACKEND: Master (Leader)
#---------------------------------------------------------------------
backend postgres_master
    mode tcp
    option tcp-check

    # --- МАГИЯ ИНТЕГРАЦИИ С PATRONI ---
    # Мы используем HTTP проверку для определения роли, хотя трафик TCP
    option httpchk GET /primary
    # Ожидаем HTTP 200 OK от API Patroni. Если 503 - нода не лидер.
    http-check expect status 200

    # Интервалы проверки здоровья
    # inter 5s: проверять каждые 5 секунд
    # fall 3: считать упавшим после 3 неудачных проверок
    # rise 2: считать здоровым после 2 успешных проверок
    default-server inter 5s fall 3 rise 2

    # --- СЕРВЕРА ---
    # Обратите внимание:
    # 1. Адрес и порт (5432) - куда идет трафик данных.
    # 2. check port 8008 - на какой порт стучаться для проверки здоровья (Patroni API).
    server vm-otus4 {IP_ADDR1}:5432 check port 8008
    server vm-otus5 {IP_ADDR2}:5432 check port 8008
    server vm-otus6 {IP_ADDR3}:5432 check port 8008

#---------------------------------------------------------------------
# FRONTEND: Чтение (READ) -> Только REPLICA
#---------------------------------------------------------------------
# Клиенты подключаются на порт 5433 для операций SELECT
frontend postgres_read
    bind *:5433
    mode tcp
    default_backend postgres_replica

#---------------------------------------------------------------------
# BACKEND: Replica
#---------------------------------------------------------------------
backend postgres_replica
    mode tcp
    option tcp-check

    # --- ПРОВЕРКА РЕПЛИК ---
    # Patroni возвращает 200 OK только если нода в режиме реплики
    option httpchk GET /replica
    http-check expect status 200

    default-server inter 5s fall 3 rise 2

    # Балансировка между репликами (roundrobin - по кругу)
    balance roundrobin

    server vm-otus4 {IP_ADDR1}:5432 check port 8008
    server vm-otus5 {IP_ADDR2}:5432 check port 8008
    server vm-otus6  {IP_ADDR3}:5432 check port 8008
